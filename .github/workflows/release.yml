name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/tabidachi

jobs:
  build-push:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for cross-platform builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Optional: uncomment + add DOCKERHUB_USERNAME / DOCKERHUB_TOKEN secrets
      # to also push to Docker Hub under <DOCKERHUB_USERNAME>/tabidachi
      # - name: Log in to Docker Hub
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.DOCKERHUB_USERNAME }}
      #     password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR_IMAGE }}
            # ${{ secrets.DOCKERHUB_USERNAME }}/tabidachi   # uncomment for Docker Hub
          tags: |
            # Full semver tag: v1.2.3
            type=semver,pattern={{version}}
            # Minor tag: 1.2
            type=semver,pattern={{major}}.{{minor}}
            # Major tag: 1
            type=semver,pattern={{major}}
            # rolling latest
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
