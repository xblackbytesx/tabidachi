services:
  tabidachi-app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    ports:
      - "8080:8080"
    env_file:
      - path: ../.env.dev
        required: false
    environment:
      DATABASE_URL: postgres://tabidachi:tabidachi@tabidachi-db:5432/tabidachi?sslmode=disable
      SESSION_SECRET: dev-session-secret-32-chars-min!!
      CSRF_AUTH_KEY: dev-csrf-key-32-chars-minimum!!!
      APP_BASE_URL: http://localhost:8080
      PORT: "8080"
      SECURE_COOKIES: "false"
      UPLOADS_DIR: data/uploads
    volumes:
      - ..:/app
      # Anonymous volume shadows the bind-mount for the vendor directory so
      # the Shoelace + HTMX files baked into the image during `docker build`
      # are never overwritten by the host bind-mount.
      - /app/web/static/vendor
      - tabidachi_uploads_dev:/app/data/uploads
    depends_on:
      tabidachi-db:
        condition: service_healthy

  tabidachi-db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: tabidachi
      POSTGRES_PASSWORD: tabidachi
      POSTGRES_DB: tabidachi
    ports:
      - "5432:5432"
    volumes:
      - tabidachi_pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tabidachi"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  tabidachi_pgdata_dev:
  tabidachi_uploads_dev:
