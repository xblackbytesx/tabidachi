name: tabidachi

networks:
  proxy:
    name: proxy
    external: true
  internal:
    internal: true

volumes:
  tabidachi-database:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DOCKER_ROOT}/tabidachi/database
  tabidachi-uploads:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DOCKER_ROOT}/tabidachi/uploads

services:
  tabidachi-db:
    image: postgres:17-alpine
    security_opt:
      - no-new-privileges:true
    networks:
      - internal
    labels:
      - "traefik.enable=false"
    environment:
      POSTGRES_USER: tabidachi
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: tabidachi
    volumes:
      - tabidachi-database:/var/lib/postgresql/data
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tabidachi"]
      interval: 5s
      timeout: 5s
      retries: 10

  tabidachi-app:
    container_name: tabidachi-app
    build:
      context: ..
      dockerfile: docker/Dockerfile
    security_opt:
      - no-new-privileges:true
    networks:
      - internal
      - proxy
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://tabidachi:${DB_PASSWORD}@tabidachi-db:5432/tabidachi?sslmode=disable
      SESSION_SECRET: ${SESSION_SECRET}
      CSRF_AUTH_KEY: ${CSRF_AUTH_KEY}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
      PORT: "8080"
      SECURE_COOKIES: ${SECURE_COOKIES:-true}
      PEXELS_API_KEY: ${PEXELS_API_KEY:-}
      UNSPLASH_ACCESS_KEY: ${UNSPLASH_ACCESS_KEY:-}
      UPLOADS_DIR: data/uploads
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - tabidachi-uploads:/app/data/uploads
    depends_on:
      tabidachi-db:
        condition: service_healthy
    restart: unless-stopped
